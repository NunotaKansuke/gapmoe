name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  flow-install:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package without extras
        run: python -m pip install .

      - name: Smoke test bundled Flow release
        run: |
          python - <<'PY'
          import jax
          import numpy as np
          import gapmoe
          from gapmoe.priors.high_level import IsochroneModel
          from gapmoe.source_selection import CmdCoordinates, CmdPriorTable

          model = gapmoe.Model().set(
              l=0.25,
              b=-3.75,
              extinction={"Imag": 1.2, "Vmag": 2.0},
          ).set_flow()
          isochrone = IsochroneModel(
              reference_band="Imag",
              color_bands=("Vmag", "Imag"),
              table=CmdPriorTable(
                  coordinates=CmdCoordinates("Imag", "Vmag", "Imag"),
                  reference_edges=np.linspace(-8.0, 20.0, 57),
                  color_edges=np.linspace(-2.0, 8.0, 41),
                  density_by_component=np.full((11, 56, 40), 1.0 / 280.0),
                  component_indices=np.arange(11),
              ),
          )
          prior = model.galactic_model(isochrone)
          assert np.isfinite(prior.log_density(np.asarray((0.3, 4.0, 8.0, 3.0, -2.0))))
          assert prior.sample_kernel(jax.random.key(0), ds=8.0, source_group=2).shape == (5,)
          PY

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*
